<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeFlow Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(to right, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .login-box {
      background: #111827;
      padding: 40px;
      width: 400px;
      border-radius: 20px;
      box-shadow: 0px 0px 30px rgba(56, 189, 248, 0.3);
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    p {
      text-align: center;
      margin-top: 20px;
      color: white;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h1>TradeFlow</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="loginUser()">Login</button>

    <p>
      Don't have an account?
      <a href="signup.html">Signup</a>
    </p>
  </div>

<script>
const API_BASE = "https://trade-flow-lc1k.onrender.com";

async function loginUser() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  const res = await fetch(`${API_BASE}/api/auth/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      email,
      password,
    }),
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message || "Login failed");
    return;
  }

  localStorage.setItem("tradeflowUser", JSON.stringify(data));

  window.location.href = "index.html";
}
</script>

</body>
</html>
