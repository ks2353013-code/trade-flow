<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeFlow AI™</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#f3f6fb;
      font-family:Arial, sans-serif;
    }

    .page{
      display:none;
    }

    .page.active{
      display:block;
    }

    .nav-btn.active{
      background:#2563eb;
      color:white;
    }
  </style>
</head>

<body class="text-slate-900">

<!-- ===================== -->
<!-- AUTH -->
<!-- ===================== -->
<section id="authScreen"
class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-blue-950 to-indigo-900 p-6">

  <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl p-8">

    <div class="text-center">
      <h1 class="text-5xl font-black text-blue-900">
        TradeFlow AI™
      </h1>

      <p class="text-slate-500 mt-3">
        Multi-Tenant Export SaaS
      </p>
    </div>

    <div class="mt-8 grid gap-4">

      <input
        id="authName"
        class="border rounded-xl px-4 py-3"
        placeholder="Owner Name (Only for Signup)"
      />

      <input
        id="companyName"
        class="border rounded-xl px-4 py-3"
        placeholder="Company Name"
      />

      <input
        id="authEmail"
        class="border rounded-xl px-4 py-3"
        placeholder="Email"
      />

      <input
        id="authPassword"
        type="password"
        class="border rounded-xl px-4 py-3"
        placeholder="Password"
      />

      <button
        onclick="login()"
        class="bg-blue-700 hover:bg-blue-800 text-white rounded-xl py-3 font-bold"
      >
        Login / Create Workspace
      </button>

    </div>

  </div>

</section>

<!-- ===================== -->
<!-- APP -->
<!-- ===================== -->
<section id="appScreen" class="hidden min-h-screen">

  <!-- SIDEBAR -->
  <aside class="fixed left-0 top-0 w-72 h-screen bg-slate-950 text-white p-6 overflow-y-auto">

    <h2 class="text-3xl font-black">
      TradeFlow AI™
    </h2>

    <p id="userRoleText" class="text-xs text-slate-400 mt-2">
      Workspace
    </p>

    <nav class="mt-8 space-y-2">

      <button onclick="showPage('dashboard')" class="nav-btn active w-full text-left px-4 py-3 rounded-xl">
        Dashboard
      </button>

      <button onclick="showPage('suppliers')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        Suppliers
      </button>

      <button onclick="showPage('crm')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        CRM
      </button>

      <button onclick="showPage('tasks')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        Tasks
      </button>

      <button onclick="showPage('documents')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        Documents
      </button>

      <button onclick="showPage('outreach')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        Outreach
      </button>

      <button onclick="showPage('leadfinder')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        AI Leads
      </button>

      <button onclick="showPage('billing')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">
        Billing
      </button>

    </nav>

    <button
      onclick="logout()"
      class="absolute bottom-6 left-6 right-6 bg-red-600 hover:bg-red-700 rounded-xl py-3 font-bold"
    >
      Logout
    </button>

  </aside>

  <!-- MAIN -->
  <main class="ml-72 p-8">

    <!-- DASHBOARD -->
    <section id="dashboard" class="page active">

      <h1 class="text-4xl font-black">
        Master Dashboard
      </h1>

      <div class="grid md:grid-cols-4 gap-5 mt-8">

        <div class="bg-white p-6 rounded-2xl shadow">
          <p>Suppliers</p>
          <h2 id="supplierCount" class="text-3xl font-black mt-2">0</h2>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow">
          <p>CRM Leads</p>
          <h2 id="leadCount" class="text-3xl font-black mt-2">0</h2>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow">
          <p>Tasks</p>
          <h2 id="taskCount" class="text-3xl font-black mt-2">0</h2>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow">
          <p>Documents</p>
          <h2 id="docCount" class="text-3xl font-black mt-2">0</h2>
        </div>

      </div>

      <div class="bg-white p-6 rounded-2xl shadow mt-8">

        <h2 class="text-2xl font-black">
          Workspace Summary
        </h2>

        <div id="workspaceSummary" class="mt-4 text-slate-700"></div>

      </div>

    </section>

    <!-- SUPPLIERS -->
    <section id="suppliers" class="page">

      <h1 class="text-4xl font-black">
        Suppliers
      </h1>

      <div class="bg-white p-6 rounded-2xl shadow mt-6 grid md:grid-cols-5 gap-3">

        <input id="supplierName" class="border rounded-xl px-4 py-3" placeholder="Company Name"/>
        <input id="supplierProduct" class="border rounded-xl px-4 py-3" placeholder="Product"/>
        <input id="supplierCountry" class="border rounded-xl px-4 py-3" placeholder="Country"/>
        <input id="supplierEmail" class="border rounded-xl px-4 py-3" placeholder="Email"/>
        <input id="supplierPhone" class="border rounded-xl px-4 py-3" placeholder="Phone"/>

        <button
          onclick="addSupplier()"
          class="bg-blue-700 text-white rounded-xl py-3 font-bold md:col-span-5"
        >
          Add Supplier
        </button>

      </div>

      <div id="supplierList" class="grid md:grid-cols-3 gap-4 mt-6"></div>

    </section>

    <!-- CRM -->
    <section id="crm" class="page">

      <h1 class="text-4xl font-black">
        CRM Leads
      </h1>

      <div class="bg-white p-6 rounded-2xl shadow mt-6 grid md:grid-cols-4 gap-3">

        <input id="leadName" class="border rounded-xl px-4 py-3" placeholder="Lead Name"/>
        <input id="leadStage" class="border rounded-xl px-4 py-3" placeholder="Stage"/>
        <input id="leadValue" type="number" class="border rounded-xl px-4 py-3" placeholder="Deal Value"/>
        <input id="leadSource" class="border rounded-xl px-4 py-3" placeholder="Source"/>

        <button
          onclick="addLead()"
          class="bg-blue-700 text-white rounded-xl py-3 font-bold md:col-span-4"
        >
          Add Lead
        </button>

      </div>

      <div id="leadList" class="grid md:grid-cols-3 gap-4 mt-6"></div>

    </section>

    <!-- TASKS -->
    <section id="tasks" class="page">

      <h1 class="text-4xl font-black">
        Tasks
      </h1>

      <div class="bg-white p-6 rounded-2xl shadow mt-6 grid md:grid-cols-3 gap-3">

        <input id="taskText" class="border rounded-xl px-4 py-3" placeholder="Task"/>

        <select id="taskPriority" class="border rounded-xl px-4 py-3">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <button
          onclick="addTask()"
          class="bg-blue-700 text-white rounded-xl py-3 font-bold"
        >
          Add Task
        </button>

      </div>

      <ul id="taskList" class="mt-6 space-y-3"></ul>

    </section>

    <!-- DOCUMENTS -->
    <section id="documents" class="page">

      <h1 class="text-4xl font-black">
        Documents
      </h1>

      <div class="bg-white p-6 rounded-2xl shadow mt-6 grid md:grid-cols-5 gap-3">

        <input id="documentTitle" class="border rounded-xl px-4 py-3" placeholder="Document Title"/>
        <input id="documentType" class="border rounded-xl px-4 py-3" placeholder="Type"/>
        <input id="documentParty" class="border rounded-xl px-4 py-3" placeholder="Party"/>
        <input id="documentAmount" class="border rounded-xl px-4 py-3" placeholder="Amount"/>

        <button
          onclick="addDocument()"
          class="bg-blue-700 text-white rounded-xl py-3 font-bold"
        >
          Add Document
        </button>

      </div>

      <div id="documentList" class="grid md:grid-cols-3 gap-4 mt-6"></div>

    </section>

    <!-- OUTREACH -->
    <section id="outreach" class="page">

      <h1 class="text-4xl font-black">
        Outreach
      </h1>

      <div class="bg-white p-6 rounded-2xl shadow mt-6">

        <input id="contactEmail"
        class="border rounded-xl px-4 py-3 mr-2"
        placeholder="Email"/>

        <input id="contactPhone"
        class="border rounded-xl px-4 py-3 mr-2"
        placeholder="WhatsApp"/>

        <textarea
          id="outreachMsg"
          class="w-full border rounded-xl px-4 py-3 mt-4"
          rows="5"
          placeholder="Message"
        ></textarea>

        <div class="mt-4 space-x-3">

          <button
            onclick="sendEmail()"
            class="bg-blue-700 text-white px-5 py-3 rounded-xl"
          >
            Send Email
          </button>

          <button
            onclick="openWhatsApp()"
            class="bg-green-700 text-white px-5 py-3 rounded-xl"
          >
            Open WhatsApp
          </button>

        </div>

      </div>

    </section>

    <!-- AI LEADS -->
    <section id="leadfinder" class="page">

      <h1 class="text-4xl font-black">
        AI Lead Finder
      </h1>

      <div class="bg-white p-6 rounded-2xl shadow mt-6">

        <input
          id="fakeLeadProduct"
          class="border rounded-xl px-4 py-3 mr-2"
          placeholder="Product"
        />

        <button
          onclick="generateFakeLeads()"
          class="bg-purple-700 text-white px-5 py-3 rounded-xl"
        >
          Generate Leads
        </button>

      </div>

      <div id="fakeLeadList" class="grid md:grid-cols-3 gap-4 mt-6"></div>

    </section>

    <!-- BILLING -->
    <section id="billing" class="page">

      <h1 class="text-4xl font-black">
        Billing Plans
      </h1>

      <div id="billingPlans" class="grid md:grid-cols-3 gap-6 mt-8"></div>

    </section>

    <footer class="mt-16 text-center text-slate-500">
      © 2026 TradeFlow AI™
    </footer>

  </main>

</section>

<script>

const API_BASE = "https://trade-flow-lc1k.onrender.com";

function getToken(){
  return localStorage.getItem("tradeflowToken");
}

function setToken(token){
  localStorage.setItem("tradeflowToken", token);
}

function removeToken(){
  localStorage.removeItem("tradeflowToken");
}

async function api(path, options = {}){

  const token = getToken();

  const headers = {
    "Content-Type":"application/json",
    ...(token ? {
      Authorization:`Bearer ${token}`
    } : {})
  };

  const response = await fetch(API_BASE + path,{
    ...options,
    headers
  });

  const data = await response.json();

  if(!response.ok){
    throw new Error(data.message || "Request failed");
  }

  return data;
}

document.addEventListener("DOMContentLoaded", async ()=>{

  const token = getToken();

  if(token){
    try{
      const data = await api("/api/auth/me");

      showApp(data.user);

      await loadAll();

    }catch(err){
      logout();
    }
  }

  loadPlans();
});

async function login(){

  try{

    const name =
      document.getElementById("authName").value.trim();

    const companyName =
      document.getElementById("companyName").value.trim();

    const email =
      document.getElementById("authEmail").value.trim();

    const password =
      document.getElementById("authPassword").value.trim();

    let data;

    if(name){

      data = await api("/api/auth/register",{
        method:"POST",
        body:JSON.stringify({
          name,
          companyName,
          email,
          password
        })
      });

    }else{

      data = await api("/api/auth/login",{
        method:"POST",
        body:JSON.stringify({
          email,
          password
        })
      });

    }

    setToken(data.token);

    showApp(data.user);

    await loadAll();

  }catch(err){
    alert(err.message);
  }

}

function logout(){
  removeToken();
  location.reload();
}

function showApp(user){

  document.getElementById("authScreen")
  .classList.add("hidden");

  document.getElementById("appScreen")
  .classList.remove("hidden");

  document.getElementById("userRoleText")
  .innerText =
    `${user.companyName} • ${user.plan}`;

}

function showPage(pageId){

  document.querySelectorAll(".page")
  .forEach(page=>{
    page.classList.remove("active");
  });

  document.querySelectorAll(".nav-btn")
  .forEach(btn=>{
    btn.classList.remove("active");
  });

  document.getElementById(pageId)
  .classList.add("active");

}

async function loadAll(){

  await Promise.all([
    loadStats(),
    loadSuppliers(),
    loadLeads(),
    loadTasks(),
    loadDocuments()
  ]);

}

async function loadStats(){

  const data =
    await api("/api/dashboard/stats");

  document.getElementById("supplierCount")
  .innerText = data.stats.suppliers;

  document.getElementById("leadCount")
  .innerText = data.stats.leads;

  document.getElementById("taskCount")
  .innerText = data.stats.tasks;

  document.getElementById("docCount")
  .innerText = data.stats.documents;

  document.getElementById("workspaceSummary")
  .innerHTML = `
    <b>${data.company.companyName}</b><br><br>

    Plan:
    ${data.company.plan}<br><br>

    Suppliers:
    ${data.stats.suppliers}/${data.usage.limits.suppliers}<br>

    Leads:
    ${data.stats.leads}/${data.usage.limits.leads}<br>

    Tasks:
    ${data.stats.tasks}/${data.usage.limits.tasks}<br>

    Documents:
    ${data.stats.documents}/${data.usage.limits.documents}
  `;

}

async function addSupplier(){

  try{

    const companyName =
      document.getElementById("supplierName").value;

    const product =
      document.getElementById("supplierProduct").value;

    const country =
      document.getElementById("supplierCountry").value;

    const email =
      document.getElementById("supplierEmail").value;

    const phone =
      document.getElementById("supplierPhone").value;

    await api("/api/suppliers",{
      method:"POST",
      body:JSON.stringify({
        companyName,
        product,
        country,
        email,
        phone
      })
    });

    loadSuppliers();
    loadStats();

  }catch(err){
    alert(err.message);
  }

}

async function loadSuppliers(){

  const data =
    await api("/api/suppliers");

  document.getElementById("supplierList")
  .innerHTML =
    data.suppliers.map(s=>`
      <div class="bg-white p-5 rounded-2xl shadow">

        <h3 class="font-black text-lg">
          ${s.companyName}
        </h3>

        <p>${s.product}</p>
        <p>${s.country}</p>
        <p>${s.email}</p>

      </div>
    `).join("");

}

async function addLead(){

  try{

    await api("/api/leads",{
      method:"POST",
      body:JSON.stringify({
        companyName:
          document.getElementById("leadName").value,

        stage:
          document.getElementById("leadStage").value,

        value:
          document.getElementById("leadValue").value,

        source:
          document.getElementById("leadSource").value
      })
    });

    loadLeads();
    loadStats();

  }catch(err){
    alert(err.message);
  }

}

async function loadLeads(){

  const data =
    await api("/api/leads");

  document.getElementById("leadList")
  .innerHTML =
    data.leads.map(l=>`
      <div class="bg-white p-5 rounded-2xl shadow">

        <h3 class="font-black text-lg">
          ${l.companyName}
        </h3>

        <p>${l.stage}</p>
        <p>₹${l.value}</p>

      </div>
    `).join("");

}

async function addTask(){

  try{

    await api("/api/tasks",{
      method:"POST",
      body:JSON.stringify({
        title:
          document.getElementById("taskText").value,

        priority:
          document.getElementById("taskPriority").value
      })
    });

    loadTasks();
    loadStats();

  }catch(err){
    alert(err.message);
  }

}

async function loadTasks(){

  const data =
    await api("/api/tasks");

  document.getElementById("taskList")
  .innerHTML =
    data.tasks.map(t=>`
      <li class="bg-white p-4 rounded-2xl shadow">
        ${t.title}
      </li>
    `).join("");

}

async function addDocument(){

  try{

    await api("/api/documents",{
      method:"POST",
      body:JSON.stringify({
        title:
          document.getElementById("documentTitle").value,

        type:
          document.getElementById("documentType").value,

        partyName:
          document.getElementById("documentParty").value,

        amount:
          document.getElementById("documentAmount").value
      })
    });

    loadDocuments();
    loadStats();

  }catch(err){
    alert(err.message);
  }

}

async function loadDocuments(){

  const data =
    await api("/api/documents");

  document.getElementById("documentList")
  .innerHTML =
    data.documents.map(d=>`
      <div class="bg-white p-5 rounded-2xl shadow">

        <h3 class="font-black text-lg">
          ${d.title}
        </h3>

        <p>${d.type}</p>
        <p>${d.partyName}</p>

      </div>
    `).join("");

}

async function sendEmail(){

  try{

    const data =
      await api("/api/outreach/email",{
        method:"POST",
        body:JSON.stringify({
          email:
            document.getElementById("contactEmail").value,

          message:
            document.getElementById("outreachMsg").value
        })
      });

    alert(data.message);

  }catch(err){
    alert(err.message);
  }

}

async function openWhatsApp(){

  try{

    const data =
      await api("/api/outreach/whatsapp",{
        method:"POST",
        body:JSON.stringify({
          phone:
            document.getElementById("contactPhone").value,

          message:
            document.getElementById("outreachMsg").value
        })
      });

    window.open(data.link,"_blank");

  }catch(err){
    alert(err.message);
  }

}

async function generateFakeLeads(){

  try{

    const product =
      document.getElementById("fakeLeadProduct").value;

    const data =
      await api("/api/ai/demo-leads",{
        method:"POST",
        body:JSON.stringify({
          product
        })
      });

    document.getElementById("fakeLeadList")
    .innerHTML =
      data.leads.map(l=>`
        <div class="bg-white p-5 rounded-2xl shadow">

          <h3 class="font-black text-lg">
            ${l.companyName}
          </h3>

          <p>${l.country}</p>
          <p>${l.email}</p>

        </div>
      `).join("");

  }catch(err){
    alert(err.message);
  }

}

async function loadPlans(){

  const data =
    await api("/api/billing/plans");

  document.getElementById("billingPlans")
  .innerHTML =
    data.plans.map(plan=>`
      <div class="bg-white p-6 rounded-2xl shadow">

        <h2 class="text-2xl font-black">
          ${plan.name}
        </h2>

        <p class="text-3xl mt-4 font-black">
          ₹${plan.price}
        </p>

        <ul class="mt-4 space-y-2">
          ${plan.features.map(f=>`
            <li>• ${f}</li>
          `).join("")}
        </ul>

      </div>
    `).join("");

}

</script>

</body>
</html>
